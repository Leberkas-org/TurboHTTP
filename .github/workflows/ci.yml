name: Build & Test

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "notes/**"
      - "*.md"
      - ".github/workflows/docs.yml"
      - ".github/workflows/commitlint.yml"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "notes/**"
      - "*.md"
      - ".github/workflows/docs.yml"
      - ".github/workflows/commitlint.yml"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/release.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GLOBAL_JSON_PATH: "./src/global.json"
  PROJECT_PATH: "./src/TurboHTTP.slnx"
  TEST_OUTPUT_DIRECTORY: "${{ github.workspace }}/testresults"
  COVERAGE_REPORT_DIRECTORY: "./coveragereport"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: "github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'chore(main): release')"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install libmsquic (QUIC/HTTP3 support)
        run: |
          wget -q https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update -qq
          sudo apt-get install -y -qq libmsquic > /dev/null

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-restore
          ${{ env.PROJECT_PATH }}

      - name: Run tests
        working-directory: "./src"
        run: >
          dotnet test
          --configuration Release
          --no-ansi
          --no-build
          --coverage
          --coverage-output-format cobertura
          --results-directory ${{ env.TEST_OUTPUT_DIRECTORY }}
          --max-parallel-test-modules 2
          --solution *.slnx

      - name: Report Code Coverage
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: "${{ env.TEST_OUTPUT_DIRECTORY }}/*cobertura.xml"
          targetdir: "${{ env.COVERAGE_REPORT_DIRECTORY }}"
          reporttypes: "MarkdownSummaryGithub"

      - name: Add Coverage Summary to Job Summary
        if: always()
        run: cat ${{ env.COVERAGE_REPORT_DIRECTORY }}/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
