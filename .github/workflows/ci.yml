name: Build & Test

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - ".github/workflows/ci.yml"

jobs:
  build:
    uses: Leberkas-org/template.pipeline.github/.github/workflows/build-test.yml@v0
    with:
      solution-path: TurboHTTP.slnx
      extra-apt-packages: libmsquic
