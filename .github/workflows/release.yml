name: Release

on:
  push:
    branches: ["main"]

env:
  GLOBAL_JSON_PATH: "./src/global.json"
  PROJECT_PATH: "./src/TurboHTTP.slnx"
  PACKAGE_OUTPUT_DIRECTORY: "./packages"

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  nuget-build:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: true

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-restore
          ${{ env.PROJECT_PATH }}
          /p:Version=${{ needs.release-please.outputs.version }}
          /p:ContinuousIntegrationBuild=true

      - name: Create NuGet package
        run: >
          dotnet pack
          --configuration Release
          --no-build
          --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}
          ${{ env.PROJECT_PATH }}
          /p:PackageVersion=${{ needs.release-please.outputs.version }}

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg

  nuget-publish:
    runs-on: ubuntu-latest
    needs: [release-please, nuget-build]
    environment: nuget
    permissions:
      id-token: write

    steps:
      - name: Download NuGet artifact
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Install .NET
        uses: actions/setup-dotnet@v5

      - name: Publish to NuGet (Trusted Publishing)
        run: >
          dotnet nuget push
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
          ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg

      - name: Attach package to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg

  docs-build:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate static png fallback diagrams
        run: npx likec4 export png --output public/diagrams ./likec4
        continue-on-error: true

      - name: Build VitePress site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  docs-deploy:
    needs: docs-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
