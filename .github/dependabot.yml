version: 2

updates:
  - package-ecosystem: nuget
    directory: "/src"
    schedule:
      interval: daily
      time: "11:00"
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      akka:
        patterns:
          - "Akka*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
      include: "scope"